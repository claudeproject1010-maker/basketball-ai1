name: One-Shot Patch

on:
  workflow_dispatch:

jobs:
  patch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Apply all patches
        run: |
          python3 << 'PYEOF'
          import os, re

          # ── PATCH 1: index.jsx ─────────────────────────────────────────
          path = "frontend/src/pages/index.jsx"
          c = open(path).read()
          original = c

          # Brightness fixes
          c = c.replace('"rgba(255,255,255,0.04)"', '"rgba(255,255,255,0.10)"')
          c = c.replace('"rgba(255,255,255,0.03)"', '"rgba(255,255,255,0.08)"')
          c = c.replace('"rgba(255,255,255,0.02)"', '"rgba(255,255,255,0.07)"')
          c = c.replace('"1px solid rgba(255,255,255,0.06)"', '"1px solid rgba(255,255,255,0.14)"')
          c = c.replace('"1px solid rgba(255,255,255,0.07)"', '"1px solid rgba(255,255,255,0.14)"')
          c = c.replace('"1px solid rgba(255,255,255,0.08)"', '"1px solid rgba(255,255,255,0.16)"')
          c = c.replace('"rgba(59,130,246,0.08)"',  '"rgba(59,130,246,0.22)"')
          c = c.replace('"rgba(99,102,241,0.07)"',  '"rgba(99,102,241,0.18)"')
          c = c.replace(
              'background:"linear-gradient(135deg,#060d1f 0%,#0b1629 40%,#060d1f 100%)"',
              'background:"linear-gradient(145deg,#04091a 0%,#071120 50%,#04091a 100%)"'
          )

          # Sidebar solid background
          c = c.replace(
              'background:"rgba(255,255,255,0.07)",\n        borderRight:"1px solid rgba(255,255,255,0.14)"',
              'background:"rgba(6,14,32,0.92)",\n        borderRight:"1px solid rgba(255,255,255,0.14)"'
          )

          # Remove display:none from mobile header so CSS controls it
          c = c.replace(
              '<div style={{display:"none"}} className="bai-mobile-header">',
              '<div className="bai-mobile-header">'
          )

          # Fix blur on glass objects to be stronger
          c = c.replace('backdropFilter:"blur(12px)"', 'backdropFilter:"blur(24px)"')
          c = c.replace('backdropFilter:"blur(20px)"', 'backdropFilter:"blur(28px)"')

          # Ensure WebkitBackdropFilter everywhere backdropFilter appears
          c = re.sub(
              r'(backdropFilter:"blur\((\d+)px\)")',
              lambda m: m.group(1) + f',WebkitBackdropFilter:"blur({m.group(2)}px)"'
              if 'WebkitBackdropFilter' not in c[max(0,c.find(m.group(1))-5):c.find(m.group(1))+100]
              else m.group(1),
              c
          )

          open(path, "w").write(c)
          changed = sum(1 for a,b in zip(original,c) if a!=b)
          print(f"index.jsx: {changed} chars changed")

          # ── PATCH 2: free_collectors.py ────────────────────────────────
          path2 = "backend/collectors/free_collectors.py"
          c2 = open(path2).read()

          # Add dotenv if not present
          if "from dotenv import load_dotenv" not in c2:
              c2 = c2.replace(
                  "import os, logging, requests",
                  "import os, logging, requests\nfrom dotenv import load_dotenv\nload_dotenv()"
              )

          # Add BDL_KEY
          if "BDL_KEY" not in c2:
              c2 = c2.replace(
                  'BDL_BASE = "https://api.balldontlie.io/v1"',
                  'BDL_KEY  = os.getenv("BALLDONTLIE_KEY", "")\nBDL_BASE = "https://api.balldontlie.io/v1"'
              )

          # Fix HEADERS to include auth
          if "_make_headers" not in c2:
              c2 = c2.replace(
                  'HEADERS = {\n    "User-Agent": "BasketballAI/1.0 (basketball prediction tool)",\n    "Accept":     "application/json",\n}',
                  'def _make_headers():\n    h = {"User-Agent":"BasketballAI/1.0","Accept":"application/json"}\n    if BDL_KEY: h["Authorization"] = BDL_KEY\n    return h\nHEADERS = _make_headers()'
              )
              # Update _bdl_get to use fresh headers
              c2 = c2.replace(
                  'requests.get(f"{BDL_BASE}/{path}", params=params, headers=HEADERS,',
                  'requests.get(f"{BDL_BASE}/{path}", params=params, headers=_make_headers(),'
              )

          # Add 401 handling
          c2 = c2.replace(
              '        r.raise_for_status()\n        return r.json()\n    except Exception as e:\n        log.warning(f"[BDL] {path} failed: {e}")\n        return None',
              '        if r.status_code == 401:\n            log.warning("[BDL] 401 - check BALLDONTLIE_KEY secret")\n            return None\n        r.raise_for_status()\n        return r.json()\n    except Exception as e:\n        log.warning(f"[BDL] {path} failed: {e}")\n        return None'
          )

          open(path2, "w").write(c2)
          print(f"free_collectors.py: patched")

          # ── PATCH 3: odds_collector.py ─────────────────────────────────
          path3 = "backend/collectors/odds_collector.py"
          c3 = open(path3).read()

          # Fix BallDontLie URLs
          c3 = c3.replace(
              '(f"{BDL_BASE}/games",      "basketball_nba",  "NBA")',
              '(f"{BDL_BASE}/nba/v1/games",  "basketball_nba",  "NBA")'
          )
          c3 = c3.replace(
              '(f"{BDL_BASE}/wnba/games", "basketball_wnba", "WNBA")',
              '(f"{BDL_BASE}/wnba/v1/games", "basketball_wnba", "WNBA")'
          )
          # Also catch any remaining old endpoints
          c3 = c3.replace('BDL_BASE}/games"', 'BDL_BASE}/nba/v1/games"')

          # Fix BDL headers
          c3 = c3.replace(
              'headers = {"Authorization": BDL_KEY}',
              'headers = {"Authorization": BDL_KEY, "Accept": "application/json"}'
          )

          open(path3, "w").write(c3)
          print(f"odds_collector.py: patched")

          print("\nAll patches applied successfully.")
          PYEOF

      - name: Commit patches
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/src/pages/index.jsx \
                  backend/collectors/free_collectors.py \
                  backend/collectors/odds_collector.py
          git diff --cached --quiet && echo "Nothing changed" || \
            git commit -m "patch: visual brightness + mobile nav + BallDontLie auth fix"
          git push
