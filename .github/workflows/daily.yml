name: Daily Pipeline

on:
  schedule:
    - cron: "0 14 * * *"
    - cron: "0 19 * * *"
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: write

    steps:
      - name: Download the code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          clean: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install packages
        run: pip install -r requirements.txt

      - name: Run the pipeline
        working-directory: backend
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python pipeline.py

      - name: Save predictions to repo (so Vercel can read them)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git stash || true
          git pull origin main --no-rebase || true
          git stash pop || true
          git add frontend/public/predictions.json frontend/public/history.json frontend/public/model_meta.json backend/models/ || true
          git diff --cached --quiet || git commit -m "predictions update $(date -u +%Y-%m-%d)"
          git push || git push --force-with-lease

      - name: Save logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: logs-${{ github.run_id }}
          path: backend/logs/
          retention-days: 14
